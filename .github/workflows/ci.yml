name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Lint Python
        run: uv run ruff check src/arr_mcp tests/

      - name: Format check
        run: uv run ruff format src/arr_mcp tests/ --check

      - name: Type check
        run: uv run mypy

      - name: Test Python
        run: uv run pytest -v --cov=arr_mcp --cov-report=term-missing --cov-fail-under=50

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm ci

      - name: Lint webapp
        working-directory: webapp
        run: npx @biomejs/biome check src/

      - name: Install Playwright browser
        working-directory: webapp
        run: npx playwright install chromium --with-deps

      - name: E2E tests
        working-directory: webapp
        run: npm run test:e2e
        env:
          CI: "true"
